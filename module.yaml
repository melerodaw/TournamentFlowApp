product: android/app

dependencies:
  - $compose.foundation
  - $compose.material3
  # Compose integration with Android activities
  - androidx.activity:activity-compose:1.7.2
  - androidx.appcompat:appcompat:1.6.1
  # Ktor client dependencies
  - io.ktor:ktor-client-core:2.3.7
  - io.ktor:ktor-client-okhttp:2.3.7
  - io.ktor:ktor-client-content-negotiation:2.3.7
  - io.ktor:ktor-serialization-kotlinx-json:2.3.7
  # Coroutines and serialization
  - org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3
  - org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.2
  # Jetpack lifecycle and navigation
  - androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0
  - androidx.navigation:navigation-compose:2.7.6
  # Image loading
  - io.coil-kt:coil-compose:2.5.0
  # Material icons
  - androidx.compose.material:material-icons-extended:1.6.0

settings:
  android:
    namespace: "com.jetbrains.sample.app"
  compose: enabled
  junit: junit-4
  kotlin:
    serialization: json